name: PSC Bot On-Demand

on:
  schedule:
    # Match the previous internal cron schedule
    - cron: '0 8 * * *'    # 8:00 AM
    - cron: '30 13 * * *'  # 1:30 PM
    - cron: '0 20 * * *'   # 8:00 PM
    - cron: '0 * * * *'    # Every hour for question generation
  workflow_dispatch:
    # Manual trigger for admin PM commands
    inputs:
      mode:
        description: 'Execution Mode'
        required: true
        default: 'interactive'
        type: choice
        options:
          - interactive
          - post_poll
          - generate_questions

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Bot Task
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN: ${{ secrets.ADMIN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FORWARD_SOURCE_ID: ${{ secrets.FORWARD_SOURCE_ID }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # Determine if it's poll time or generation time
            HOUR=$(date +%H)
            MINUTE=$(date +%M)
            if [[ "$MINUTE" == "00" && ( "$HOUR" == "08" || "$HOUR" == "20" ) ]] || [[ "$HOUR" == "13" && "$MINUTE" == "30" ]]; then
              node index.js --cron
            else
              node index.js --gen
            fi
          else
            # Manual trigger
            case "${{ github.event.inputs.mode }}" in
              "post_poll") node index.js --cron ;;
              "generate_questions") node index.js --gen ;;
              "interactive") node index.js ;;
            esac
          fi
